<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
            background-color: #f9f9f9;
        }

       .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

       .item-info {
            flex-grow: 1;
            margin-left: 15px;
        }

       .item-name {
            font-weight: bold;
            font-size: 18px;
        }

       .item-price {
            color: #555;
        }

       .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

       .qty-btn {
            width: 30px;
            height: 30px;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: 4px;
        }

       .qty-btn:hover {
            background-color: #0056b3;
        }

       .quantity {
            font-size: 16px;
            min-width: 20px;
            text-align: center;
        }

       .actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

       .like-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #ccc;
            cursor: pointer;
            transition: color 0.3s;
        }

       .like-btn.liked {
            color: red;
        }

       .delete-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #dc3545;
            cursor: pointer;
        }

       .total-section {
            text-align: right;
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #ddd;
        }
    </style>
</head>
<body>

    <h1>Shopping Cart</h1>

    <div id="cart-container">
        <!-- Cart Item 1 -->
        <div class="cart-item" data-price="29.99">
            <div class="item-info">
                <div class="item-name">Wireless Headphones</div>
                <div class="item-price">$29.99 each</div>
            </div>
            <div class="quantity-control">
                <button class="qty-btn minus">-</button>
                <span class="quantity">1</span>
                <button class="qty-btn plus">+</button>
            </div>
            <div class="actions">
                <button class="like-btn"><i class="fas fa-heart"></i></button>
                <button class="delete-btn"><i class="fas fa-trash"></i></button>
            </div>
        </div>

        <!-- Cart Item 2 -->
        <div class="cart-item" data-price="15.50">
            <div class="item-info">
                <div class="item-name">Smart Watch</div>
                <div class="item-price">$15.50 each</div>
            </div>
            <div class="quantity-control">
                <button class="qty-btn minus">-</button>
                <span class="quantity">1</span>
                <button class="qty-btn plus">+</button>
            </div>
            <div class="actions">
                <button class="like-btn"><i class="fas fa-heart"></i></button>
                <button class="delete-btn"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    </div>

    <div class="total-section">
        Total: $<span id="total-price">45.49</span>
    </div>

    <script>
        // Function to calculate and update total price
        function updateTotal() {
            let total = 0;
            document.querySelectorAll('.cart-item').forEach(item => {
                const price = parseFloat(item.dataset.price);
                const quantity = parseInt(item.querySelector('.quantity').textContent);
                total += price * quantity;
            });
            document.getElementById('total-price').textContent = total.toFixed(2);
        }

        // Add event listeners to all items
        document.querySelectorAll('.cart-item').forEach(item => {
            // Plus button
            item.querySelector('.plus').addEventListener('click', () => {
                const qtyEl = item.querySelector('.quantity');
                qtyEl.textContent = parseInt(qtyEl.textContent) + 1;
                updateTotal();
            });

            // Minus button
            item.querySelector('.minus').addEventListener('click', () => {
                const qtyEl = item.querySelector('.quantity');
                let currentQty = parseInt(qtyEl.textContent);
                if (currentQty > 1) {
                    qtyEl.textContent = currentQty - 1;
                    updateTotal();
                }
            });

            // Like button
            item.querySelector('.like-btn').addEventListener('click', function() {
                this.classList.toggle('liked');
            });

            // Delete button
            item.querySelector('.delete-btn').addEventListener('click', () => {
                item.remove();
                updateTotal();
            });
        });
    </script>

</body>
</html>
